<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator - Knitnox</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #e6e9ef;
      --light: #ffffff;
      --dark: #c2c8d0;
      --text: #2a2f3a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .calculator {
      max-width: 380px;
      width: 100%;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 1.8rem;
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      letter-spacing: 2px;
      color: var(--text);
      margin-bottom: 6px;
    }

    .header p {
      font-size: 0.85rem;
      color: #888;
    }

    .calc-body {
      padding: 24px;
      border-radius: 20px;
      background: var(--bg);
      box-shadow: 10px 10px 20px var(--dark),
                  -10px -10px 20px var(--light);
    }

    .display {
      margin-bottom: 24px;
      padding: 20px;
      border-radius: 14px;
      background: var(--bg);
      box-shadow: inset 6px 6px 12px var(--dark),
                  inset -6px -6px 12px var(--light);
      text-align: right;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .display-previous {
      font-size: 0.9rem;
      color: #888;
      min-height: 20px;
      margin-bottom: 4px;
    }

    .display-current {
      font-size: 2rem;
      font-weight: 600;
      color: var(--text);
      word-wrap: break-word;
      word-break: break-all;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .btn {
      padding: 22px;
      border-radius: 14px;
      background: var(--bg);
      box-shadow: 6px 6px 12px var(--dark),
                  -6px -6px 12px var(--light);
      border: none;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: 0.15s ease;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    .btn:active {
      box-shadow: inset 4px 4px 8px var(--dark),
                  inset -4px -4px 8px var(--light);
    }

    .btn.operator {
      color: #5a8dee;
      font-weight: 700;
    }

    .btn.equals {
      grid-column: span 2;
      background: linear-gradient(145deg, #5a8dee, #4a7bde);
      color: white;
      box-shadow: 6px 6px 12px var(--dark),
                  -6px -6px 12px var(--light);
    }

    .btn.equals:active {
      box-shadow: inset 4px 4px 8px rgba(0,0,0,0.2),
                  inset -2px -2px 6px rgba(255,255,255,0.1);
    }

    .btn.clear {
      color: #ff6b6b;
      font-weight: 700;
    }

    .btn.zero {
      grid-column: span 2;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.8rem;
      color: #888;
    }

    .footer a {
      color: #5a8dee;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="header">
      <h1>Calculator</h1>
      <p>Neumorphic Calculator</p>
    </div>

    <div class="calc-body">
      <div class="display">
        <div class="display-previous" id="previous-display"></div>
        <div class="display-current" id="current-display">0</div>
      </div>

      <div class="buttons">
        <button class="btn clear" onclick="clearAll()">C</button>
        <button class="btn clear" onclick="deleteLast()">⌫</button>
        <button class="btn operator" onclick="setOperation('%')">%</button>
        <button class="btn operator" onclick="setOperation('÷')">÷</button>

        <button class="btn" onclick="appendNumber('7')">7</button>
        <button class="btn" onclick="appendNumber('8')">8</button>
        <button class="btn" onclick="appendNumber('9')">9</button>
        <button class="btn operator" onclick="setOperation('×')">×</button>

        <button class="btn" onclick="appendNumber('4')">4</button>
        <button class="btn" onclick="appendNumber('5')">5</button>
        <button class="btn" onclick="appendNumber('6')">6</button>
        <button class="btn operator" onclick="setOperation('-')">-</button>

        <button class="btn" onclick="appendNumber('1')">1</button>
        <button class="btn" onclick="appendNumber('2')">2</button>
        <button class="btn" onclick="appendNumber('3')">3</button>
        <button class="btn operator" onclick="setOperation('+')">+</button>

        <button class="btn zero" onclick="appendNumber('0')">0</button>
        <button class="btn" onclick="appendNumber('.')">.</button>
        <button class="btn equals" onclick="calculate()">=</button>
      </div>
    </div>

    <div class="footer">
      <a href="../../index.html#apps">← Back to Apps</a>
    </div>
  </div>

  <script>
    let currentValue = '0';
    let previousValue = '';
    let operation = null;
    let shouldResetDisplay = false;

    const currentDisplay = document.getElementById('current-display');
    const previousDisplay = document.getElementById('previous-display');

    function updateDisplay() {
      currentDisplay.textContent = currentValue;
      if (previousValue && operation) {
        previousDisplay.textContent = `${previousValue} ${operation}`;
      } else {
        previousDisplay.textContent = '';
      }
    }

    function appendNumber(number) {
      if (shouldResetDisplay) {
        currentValue = '0';
        shouldResetDisplay = false;
      }

      if (number === '.' && currentValue.includes('.')) return;
      
      if (currentValue === '0' && number !== '.') {
        currentValue = number;
      } else {
        currentValue += number;
      }
      
      updateDisplay();
    }

    function setOperation(op) {
      if (operation !== null && previousValue !== '') {
        calculate();
      }
      
      operation = op;
      previousValue = currentValue;
      shouldResetDisplay = true;
      updateDisplay();
    }

    function calculate() {
      if (operation === null || previousValue === '') return;

      const prev = parseFloat(previousValue);
      const current = parseFloat(currentValue);
      let result;

      switch (operation) {
        case '+':
          result = prev + current;
          break;
        case '-':
          result = prev - current;
          break;
        case '×':
          result = prev * current;
          break;
        case '÷':
          result = current !== 0 ? prev / current : 'Error';
          break;
        case '%':
          result = prev % current;
          break;
        default:
          return;
      }

      currentValue = result.toString();
      if (currentValue.length > 12) {
        currentValue = parseFloat(currentValue).toExponential(6);
      }
      
      operation = null;
      previousValue = '';
      shouldResetDisplay = true;
      updateDisplay();
    }

    function clearAll() {
      currentValue = '0';
      previousValue = '';
      operation = null;
      shouldResetDisplay = false;
      updateDisplay();
    }

    function deleteLast() {
      if (currentValue.length > 1) {
        currentValue = currentValue.slice(0, -1);
      } else {
        currentValue = '0';
      }
      updateDisplay();
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') {
        appendNumber(e.key);
      } else if (e.key === '.') {
        appendNumber('.');
      } else if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') {
        const op = e.key === '*' ? '×' : e.key === '/' ? '÷' : e.key;
        setOperation(op);
      } else if (e.key === 'Enter' || e.key === '=') {
        e.preventDefault();
        calculate();
      } else if (e.key === 'Escape') {
        clearAll();
      } else if (e.key === 'Backspace') {
        deleteLast();
      }
    });

    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker registered'))
          .catch(err => console.log('Service Worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
